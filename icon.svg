<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1a1a2e"/>
  <!-- Clock face -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#e94560" stroke-width="20"/>
  <!-- Hour hand (pointing to ~12) -->
  <line x1="256" y1="256" x2="256" y2="136" stroke="#e94560" stroke-width="16" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~3, i.e. overtime) -->
  <line x1="256" y1="256" x2="356" y2="256" stroke="#e94560" stroke-width="12" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="10" fill="#e94560"/>
  <!-- Plus mark suggesting overtime -->
  <line x1="380" y1="130" x2="420" y2="130" stroke="#4ade80" stroke-width="12" stroke-linecap="round"/>
  <line x1="400" y1="110" x2="400" y2="150" stroke="#4ade80" stroke-width="12" stroke-linecap="round"/>
</svg>
